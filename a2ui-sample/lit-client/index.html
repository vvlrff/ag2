<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A2UI Lit Client — AG2</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" />
  <style>
    :root {
      /* Primary palette */
      --p-10: #001944; --p-20: #002d6e; --p-30: #00419a; --p-40: #1a5cc8;
      --p-50: #3c76e3; --p-60: #5b90ff; --p-70: #89adff; --p-80: #b0c8ff;
      --p-90: #d8e2ff; --p-95: #ecf0ff; --p-99: #fdfbff; --p-100: #ffffff;
      /* Neutral palette */
      --n-0: #000000; --n-4: #0c0e11; --n-6: #111318; --n-10: #1b1b1f;
      --n-12: #1f2024; --n-17: #2a2a2e; --n-20: #303034; --n-22: #343438;
      --n-24: #38383c; --n-30: #46464a; --n-40: #5e5e62; --n-50: #77777a;
      --n-60: #919094; --n-70: #ababaf; --n-80: #c7c6ca; --n-87: #dad9dd;
      --n-90: #e3e2e6; --n-92: #e9e7ec; --n-94: #eeedf1; --n-95: #f2f0f4;
      --n-96: #f5f3f7; --n-98: #faf8fc; --n-100: #ffffff;
      /* Error */
      --e-40: #ba1a1a; --e-80: #ffb4ab; --e-90: #ffdad6;

      --font-family: 'Outfit', sans-serif;
      --bb-grid-size: 4px;
      --bb-grid-size-2: 8px;
      --bb-grid-size-3: 12px;
      --bb-grid-size-4: 16px;
      --bb-grid-size-5: 20px;
      --bb-grid-size-6: 24px;
      --bb-grid-size-8: 32px;

      color-scheme: light dark;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: light-dark(var(--n-98), var(--n-6));
      color: light-dark(var(--n-10), var(--n-90));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <a2ui-app></a2ui-app>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
